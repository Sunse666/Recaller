services:
  backend:
    build: ./backend
    container_name: recaller-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data

  nginx:
    build:
      context: ./frontend
    container_name: recaller-nginx
    restart: unless-stopped
    ports:
      - "5174:80"
    volumes:
      - ./data:/data:ro
    depends_on:
      - backend
