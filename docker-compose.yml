services:
  backend:
    build: ./backend
    container_name: recaller-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./backend/app:/app/app
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: recaller-frontend
    restart: unless-stopped
    ports:
      - "5174:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
