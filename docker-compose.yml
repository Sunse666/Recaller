services:
  backend:
    build: ./backend
    container_name: recaller-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data

  frontend:
    build: ./frontend
    container_name: recaller-frontend
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend
