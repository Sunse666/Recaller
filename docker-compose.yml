services:
  backend:
    build: ./backend
    container_name: recaller-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123

  frontend:
    build: ./frontend
    container_name: recaller-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
